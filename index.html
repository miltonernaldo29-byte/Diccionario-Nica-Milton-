<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Nica Milton - Premium v2.5</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-blue-950 min-h-screen flex items-center justify-center p-3 sm:p-6">

    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [translationMode, setTranslationMode] = useState('nicaToStandard'); 
            const [translation, setTranslation] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            
            // Gestión de la API Key en LocalStorage
            const [apiKey, setApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [tempKey, setTempKey] = useState('');

            // GESTIÓN PREMIUM
            const [premiumPin, setPremiumPin] = useState('');
            const [isPremiumUnlocked, setIsPremiumUnlocked] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);

            // Código secreto maestro para desbloquear las funciones en inglés
            const SECRET_MASTER_PIN = "MILTON2026";

            // Cargar datos guardados al iniciar
            useEffect(() => {
                const savedKey = localStorage.getItem('nica_translator_apikey');
                if (savedKey) {
                    setApiKey(savedKey);
                    setTempKey(savedKey);
                }
                const savedPin = localStorage.getItem('nica_translator_premium_pin');
                if (savedPin === SECRET_MASTER_PIN) {
                    setPremiumPin(savedPin);
                    setIsPremiumUnlocked(true);
                }
            }, []);

            // Activar el pin premium
            const handleUnlockPremium = () => {
                if (pinInput.trim() === SECRET_MASTER_PIN) {
                    localStorage.setItem('nica_translator_premium_pin', SECRET_MASTER_PIN);
                    setPremiumPin(SECRET_MASTER_PIN);
                    setIsPremiumUnlocked(true);
                    setPinError(false);
                } else {
                    setPinError(true);
                }
            };

            // Cerrar sesión premium
            const handleLockPremium = () => {
                localStorage.removeItem('nica_translator_premium_pin');
                setPremiumPin('');
                setIsPremiumUnlocked(false);
                setPinInput('');
                setTranslation(null);
            };

            const saveApiKey = () => {
                localStorage.setItem('nica_translator_apikey', tempKey);
                setApiKey(tempKey);
                setShowSettings(false);
            };

            const clearApiKey = () => {
                localStorage.removeItem('nica_translator_apikey');
                setApiKey('');
                setTempKey('');
            };

            const localDictionary = {
                "chele": "Persona de tez clara o rubia.",
                "tuani": "Algo excelente, genial, bonito o de buena calidad.",
                "deacachimba": "Espectacular, sumamente bueno o excelente.",
                "palmado": "Sin dinero, quebrado financieramente.",
                "ideay": "Expresión de sorpresa, reclamo o saludo ('¿Qué pasó?').",
                "arrecho": "Enojado, furioso o con mal carácter.",
                "batuquear": "Mover fuertemente un líquido o agitar cosas.",
                "chigüín": "Niño pequeño, muchacho.",
                "chunche": "Cosa, objeto cuyo nombre no se recuerda.",
                "pofi": "Amigo íntimo, compañero de confianza.",
                "maje": "Persona, amigo (o tonto, según el contexto de uso)."
            };

            // Validar si el modo seleccionado requiere premium (Solo los de Slang Americano)
            const isModeLocked = (mode) => {
                const premiumModes = ['usSlangToSpanish', 'englishToUsSlang'];
                return premiumModes.includes(mode) && !isPremiumUnlocked;
            };

            const translateText = async () => {
                if (isModeLocked(translationMode)) {
                    setError('Este modo requiere una cuenta Premium activa.');
                    return;
                }

                if (!inputText.trim()) {
                    setError('Por favor, ingresa algún texto para traducir.');
                    setTranslation(null);
                    return;
                }

                setIsLoading(true);
                setError(null);
                setTranslation(null);

                if (!apiKey) {
                    const word = inputText.toLowerCase().trim();
                    if (localDictionary[word]) {
                        setTranslation({
                            translatedText: localDictionary[word],
                            terms: [{
                                term: word,
                                explanation: "Definición cargada desde el catálogo local rápido de la aplicación."
                            }]
                        });
                        setIsLoading(false);
                        return;
                    }
                    setError('Falta conectar tu API Key de Gemini. Ve al botón de configuración ⚙️ arriba para guardarla.');
                    setIsLoading(false);
                    return;
                }

                let prompt = '';
                if (translationMode === 'nicaToStandard') {
                    prompt = `Traduce el siguiente texto en Español Nicaragüense a un español estándar neutro. Identifica y explica detalladamente cada término nicaragüense. Texto Original: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'standardToNica') {
                    prompt = `Traduce el siguiente texto en español estándar a un Español Nicaragüense coloquial y natural de forma auténtica. Texto Original: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'nicaToEnglish') {
                    prompt = `Translate the following Nicaraguan Spanish text into natural English. Identify and explain terms in English. Original Text: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'usSlangToSpanish') {
                    prompt = `Traduce el siguiente texto en inglés de EE.UU. (slang/idioms) a su equivalente más natural en español coloquial o nica. Texto Original: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'englishToUsSlang') {
                    prompt = `Transform the following standard English text into informal American English with heavy US slang. Original Text: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                }

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                "translatedText": { "type": "STRING" },
                                "terms": {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: {
                                            term: { type: "STRING" },
                                            explanation: { type: "STRING" }
                                        },
                                        required: ["term", "explanation"]
                                    }
                                }
                            },
                            required: ["translatedText", "terms"]
                        }
                    }
                };

                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`Error de conexión o API Key inválida.`);
                    const result = await response.json();
                    if (result.candidates && result.candidates[0]?.content?.parts[0]?.text) {
                        setTranslation(JSON.parse(result.candidates[0].content.parts[0].text));
                    } else {
                        setError('No se pudo procesar la traducción.');
                    }
                } catch (err) {
                    setError(err.message || 'Error de red.');
                } finally {
                    setIsLoading(false);
                }
            };

            const getPlaceholder = () => {
                if (isModeLocked(translationMode)) return "🔒 Desbloquea el Módulo Americano Premium para usar esta función...";
                if (translationMode === 'standardToNica') return 'Escribe algo formal (ej. "Hola amigo, no tengo dinero")...';
                if (translationMode === 'usSlangToSpanish') return 'Escribe jerga de EE.UU. (ej. "I\'m totally broke")...';
                if (translationMode === 'nicaToEnglish') return 'Escribe en nica para pasarlo a inglés (ej. "Ese maje es bien tuani")...';
                return 'Escribe en Español Nicaragüense (ej. "Ideay chele, ando palmado")...';
            };

            return (
                <div className="bg-slate-900/90 border border-slate-800 p-5 md:p-8 rounded-2xl shadow-2xl w-full text-white backdrop-blur-md transition-all duration-300">
                    
                    {/* Encabezado */}
                    <div className="flex justify-between items-start mb-6">
                        <div className="text-left">
                            <h1 className="text-2xl sm:text-4xl font-extrabold tracking-tight leading-tight">
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Traductor Nica</span>{" "}
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-amber-400">Milton v2.5</span>
                            </h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-xs text-slate-400 font-semibold uppercase tracking-wider">Cultura Nicaragüense & Internacional</span>
                                {isPremiumUnlocked ? (
                                    <span className="bg-amber-500/20 text-amber-400 border border-amber-500/40 text-[10px] px-1.5 py-0.5 rounded-md font-bold uppercase tracking-wider">⭐ Slang Premium Activo</span>
                                ) : (
                                    <span className="bg-blue-500/20 text-blue-400 border border-blue-500/30 text-[10px] px-1.5 py-0.5 rounded-md font-bold uppercase">Acceso Nica Libre</span>
                                )}
                            </div>
                        </div>
                        
                        <button 
                            onClick={() => setShowSettings(!showSettings)}
                            className="p-2 rounded-xl bg-slate-800 text-slate-300 hover:text-white hover:bg-slate-700 transition"
                            title="Configuración"
                        >
                            <i className="ph-bold ph-gear text-xl"></i>
                        </button>
                    </div>

                    {/* Ajustes */}
                    {showSettings && (
                        <div className="mb-6 p-4 bg-slate-800/80 border border-slate-700 rounded-xl fade-in text-sm space-y-4">
                            <div>
                                <h3 className="font-bold text-white mb-1 flex items-center gap-2 text-xs uppercase text-blue-400"><i className="ph-bold ph-key"></i> Clave de API de Gemini</h3>
                                <div className="flex gap-2">
                                    <input type="password" value={tempKey} onChange={(e) => setTempKey(e.target.value)} placeholder="AIzaSy..." className="flex-grow bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-white text-xs focus:outline-none"/>
                                    <button onClick={saveApiKey} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-xs">Guardar</button>
                                    {apiKey && <button onClick={clearApiKey} className="px-2 py-1.5 bg-rose-900/50 hover:bg-rose-900 text-rose-300 rounded-lg text-xs">Limpiar</button>}
                                </div>
                            </div>
                            <hr className="border-slate-700"/>
                            <div>
                                <h3 className="font-bold text-white mb-1 flex items-center gap-2 text-xs uppercase text-amber-400"><i className="ph-bold ph-shield-star"></i> Módulos Estadounidenses Premium</h3>
                                {isPremiumUnlocked ? (
                                    <div className="flex justify-between items-center bg-amber-950/20 p-2 rounded-lg border border-amber-900/40">
                                        <span className="text-xs text-amber-300 font-medium">¡Módulos de Slang de EE.UU. Desbloqueados!</span>
                                        <button onClick={handleLockPremium} className="text-xs text-rose-400 underline hover:text-rose-300">Volver a bloquear</button>
                                    </div>
                                ) : (
                                    <div className="space-y-2">
                                        <p className="text-[11px] text-slate-400">Ingresa el PIN comprado a Milton para liberar las herramientas avanzadas de Slang e Inglés Informal Americano.</p>
                                        <div className="flex gap-2">
                                            <input type="text" value={pinInput} onChange={(e) => setPinInput(e.target.value)} placeholder="Introduce tu PIN Premium" className="flex-grow bg-slate-950 border border-slate-700 rounded-lg px-3 py-1.5 text-white text-xs focus:outline-none uppercase"/>
                                            <button onClick={handleUnlockPremium} className="px-3 py-1.5 bg-amber-600 hover:bg-amber-500 rounded-lg text-white font-bold text-xs">Activar</button>
                                        </div>
                                        {pinError && <p className="text-rose-400 text-[11px] font-semibold">⚠️ PIN Incorrecto.</p>}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Selector de Modos Libres (¡Nica a Inglés Incluido!) */}
                    <div className="space-y-3 mb-4">
                        <div className="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                            <span className="block text-[10px] font-extrabold text-blue-400 uppercase tracking-widest mb-2">Diccionarios del Canal (100% Gratis)</span>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                <button onClick={() => { setTranslationMode('nicaToStandard'); setTranslation(null); setError(null); }} className={`py-2 px-3 rounded-lg font-bold text-xs transition ${translationMode === 'nicaToStandard' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400 border border-slate-800'}`}>Nica ➜ Estándar</button>
                                <button onClick={() => { setTranslationMode('standardToNica'); setTranslation(null); setError(null); }} className={`py-2 px-3 rounded-lg font-bold text-xs transition ${translationMode === 'standardToNica' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400 border border-slate-800'}`}>Estándar ➜ Nica</button>
                                <button onClick={() => { setTranslationMode('nicaToEnglish'); setTranslation(null); setError(null); }} className={`py-2 px-3 rounded-lg font-bold text-xs transition ${translationMode === 'nicaToEnglish' ? 'bg-emerald-600 text-white' : 'bg-slate-900 text-slate-400 border border-slate-800'}`}>🇳🇮 Nica ➜ Inglés 🇬🇧</button>
                            </div>
                        </div>

                        {/* Selector de Modos Premium (Solo Slang) */}
                        <div className="bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                            <span className="block text-[10px] font-extrabold text-amber-400 uppercase tracking-widest mb-2 flex items-center gap-1">
                                <i className="ph-bold ph-crown text-amber-400"></i> Módulos Slang Americano (Premium)
                            </span>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                <button onClick={() => { setTranslationMode('usSlangToSpanish'); setTranslation(null); setError(null); }} className={`py-2 px-2 rounded-lg font-bold text-xs transition flex items-center justify-center gap-1 ${translationMode === 'usSlangToSpanish' ? 'bg-amber-600 text-white' : 'bg-slate-900 text-slate-400 border border-slate-800'}`}>
                                    {isModeLocked('usSlangToSpanish') && <i className="ph-bold ph-lock text-[11px] text-amber-400"></i>} 🇺🇸 Slang EE.UU. ➜ Español
                                </button>
                                <button onClick={() => { setTranslationMode('englishToUsSlang'); setTranslation(null); setError(null); }} className={`py-2 px-2 rounded-lg font-bold text-xs transition flex items-center justify-center gap-1 ${translationMode === 'englishToUsSlang' ? 'bg-amber-600 text-white' : 'bg-slate-900 text-slate-400 border border-slate-800'}`}>
                                    {isModeLocked('englishToUsSlang') && <i className="ph-bold ph-lock text-[11px] text-amber-400"></i>} Inglés Estándar ➜ 🇺🇸 Slang
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Bloque de bloqueo visual si no es premium */}
                    {isModeLocked(translationMode) ? (
                        <div className="bg-slate-950 border border-amber-900/60 p-6 rounded-xl text-center space-y-3 mb-4 fade-in">
                            <i className="ph-bold ph-lock-key text-4xl text-amber-400 animate-bounce"></i>
                            <h3 className="font-bold text-base text-amber-300">¡Módulo Slang Americano Bloqueado!</h3>
                            <p className="text-xs text-slate-400 max-w-md mx-auto">Aprender a traducir modismos callejeros de Estados Unidos y dominar el inglés informal requiere activación Premium. Adquiere tu PIN de acceso con Milton.</p>
                            <button onClick={() => setShowSettings(true)} className="px-4 py-1.5 bg-amber-600 hover:bg-amber-500 rounded-lg text-xs font-bold transition">Ingresar mi PIN de Activación</button>
                        </div>
                    ) : (
                        <div className="mb-4 fade-in">
                            <textarea
                                className="w-full p-4 bg-slate-950 border-2 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition text-sm sm:text-base resize-none min-h-[110px]"
                                placeholder={getPlaceholder()}
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                rows="4"
                            ></textarea>
                        </div>
                    )}

                    {/* Botón Traducir */}
                    <button
                        onClick={translateText}
                        disabled={isLoading || isModeLocked(translationMode)}
                        className={`w-full py-3.5 rounded-xl font-bold text-sm shadow-lg transition transform active:scale-[0.99]
                            ${isLoading || isModeLocked(translationMode) ? 'bg-slate-800 cursor-not-allowed text-slate-500' : 'bg-gradient-to-r from-blue-600 via-teal-600 to-emerald-600 text-white'}`}
                    >
                        {isLoading ? "Analizando modismos con IA..." : "Procesar Traducción Inteligente"}
                    </button>

                    {/* Errores */}
                    {error && (
                        <div className="mt-4 p-3 bg-red-950/40 border border-red-900 text-red-300 rounded-xl text-xs font-medium fade-in">
                            <p className="font-bold">⚠️ Nota del Sistema:</p>
                            <p>{error}</p>
                        </div>
                    )}

                    {/* Resultados */}
                    {translation && (
                        <div className="mt-6 pt-5 border-t border-slate-800 fade-in">
                            <h2 className="text-sm font-bold text-slate-300 mb-3 flex items-center gap-1"><i className="ph-bold ph-sparkle text-emerald-400"></i> Resultado Oficial:</h2>
                            <div className="p-4 rounded-xl mb-4 bg-emerald-950/10 border border-emerald-950 text-sm font-semibold">
                                {translation.translatedText}
                            </div>
                            {translation.terms && translation.terms.length > 0 && (
                                <div className="bg-slate-950/40 p-4 rounded-xl border border-slate-800 space-y-3">
                                    <h3 className="text-[10px] font-extrabold text-amber-400 uppercase tracking-widest"><i className="ph-bold ph-lightbulb"></i> Modismos analizados:</h3>
                                    {translation.terms.map((termObj, index) => (
                                        <div key={index} className="border-b border-slate-800/40 pb-2 last:border-none last:pb-0 text-xs">
                                            <p className="font-bold text-amber-300">✨ {termObj.term}</p>
                                            <p className="text-slate-300 mt-0.5 pl-4">{termObj.explanation}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
