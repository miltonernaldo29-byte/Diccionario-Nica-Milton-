<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Nica Milton - Premium v2.6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-blue-950 min-h-screen flex items-center justify-center p-3 sm:p-6">
    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [translationMode, setTranslationMode] = useState('nicaToStandard'); 
            const [translation, setTranslation] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            
            // TU API KEY INTEGRADA PARA EL PÚBLICO
            const API_KEY = "AQ.Ab8RN6JikQTHMa7I9sMXHUj-C_DbEAZQFaiCZtseucow8VWNgQ";

            const [isPremiumUnlocked, setIsPremiumUnlocked] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);

            const SECRET_MASTER_PIN = "MILTON2026";
            const WHATSAPP_NUMBER = "50582617798"; // <--- ¡CAMBIA ESTO POR TU NÚMERO REAL!
            const WHATSAPP_LINK = `https://wa.me/${WHATSAPP_NUMBER}?text=Hola%20Milton,%20quiero%20comprar%20el%20PIN%20Premium%20para%20el%20Traductor%20Nica`;

            useEffect(() => {
                const savedPin = localStorage.getItem('nica_translator_premium_pin');
                if (savedPin === SECRET_MASTER_PIN) setIsPremiumUnlocked(true);
            }, []);

            const handleUnlockPremium = () => {
                if (pinInput.trim() === SECRET_MASTER_PIN) {
                    localStorage.setItem('nica_translator_premium_pin', SECRET_MASTER_PIN);
                    setIsPremiumUnlocked(true);
                    setPinError(false);
                } else {
                    setPinError(true);
                }
            };

            const translateText = async () => {
                if (['usSlangToSpanish', 'englishToUsSlang'].includes(translationMode) && !isPremiumUnlocked) {
                    setError('Este modo requiere una cuenta Premium.');
                    return;
                }
                if (!inputText.trim()) return;

                setIsLoading(true);
                setError(null);

                const prompts = {
                    nicaToStandard: `Traduce de Español Nicaragüense a español estándar. Texto: "${inputText}"`,
                    standardToNica: `Traduce de español estándar a Español Nicaragüense coloquial. Texto: "${inputText}"`,
                    nicaToEnglish: `Translate from Nicaraguan Spanish to natural English. Text: "${inputText}"`,
                    usSlangToSpanish: `Traduce este inglés coloquial/slang de EE.UU. a español nica natural. Texto: "${inputText}"`,
                    englishToUsSlang: `Transform this into informal American English slang. Text: "${inputText}"`
                };

                const payload = { contents: [{ parts: [{ text: prompts[translationMode] + " Devuelve JSON: {'translatedText': '...', 'terms': [{'term': '...', 'explanation': '...'}]}" }] }] };
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    const text = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                    setTranslation(JSON.parse(text));
                } catch (err) {
                    setError('Error al conectar con la IA.');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="bg-slate-900/90 border border-slate-800 p-5 rounded-2xl shadow-2xl text-white">
                    <h1 className="text-2xl font-bold mb-4 text-center">Traductor Nica Milton v2.6</h1>
                    
                    <div className="grid grid-cols-2 gap-2 mb-4">
                        <button onClick={() => setTranslationMode('nicaToStandard')} className="p-2 bg-blue-600 rounded-lg text-xs">Nica ➜ Estándar</button>
                        <button onClick={() => setTranslationMode('nicaToEnglish')} className="p-2 bg-emerald-600 rounded-lg text-xs">Nica ➜ Inglés</button>
                    </div>

                    {!isPremiumUnlocked && ['usSlangToSpanish', 'englishToUsSlang'].includes(translationMode) ? (
                        <div className="p-4 bg-amber-900/20 border border-amber-600 rounded-lg text-center">
                            <p className="text-sm mb-2">Módulo Premium bloqueado</p>
                            <a href={WHATSAPP_LINK} className="block w-full py-2 bg-emerald-600 rounded-lg text-xs font-bold">Comprar PIN por WhatsApp</a>
                            <input className="w-full mt-2 p-2 bg-black rounded text-xs" placeholder="Ingresar PIN" onChange={(e) => setPinInput(e.target.value)} />
                            <button onClick={handleUnlockPremium} className="mt-1 w-full bg-amber-600 p-1 text-xs rounded">Activar</button>
                        </div>
                    ) : (
                        <textarea className="w-full p-3 bg-slate-950 rounded-lg border border-slate-700 text-sm" rows="3" placeholder="Escribe aquí..." onChange={(e) => setInputText(e.target.value)}></textarea>
                    )}

                    <button onClick={translateText} className="w-full mt-3 p-3 bg-indigo-600 rounded-lg font-bold">Traducir</button>
                    
                    {translation && <div className="mt-4 p-4 bg-slate-800 rounded-lg text-sm">{translation.translatedText}</div>}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
