<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Nica Milton - Premium v2.7</title>
    <!-- Cargamos React y ReactDOM de forma estable -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone para transpilar React en tiempo real -->
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <!-- Tailwind CSS para estilizado premium responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Phosphor para interfaz visual -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-blue-950 min-h-screen flex items-center justify-center p-3 sm:p-6">

    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [translationMode, setTranslationMode] = useState('nicaToStandard'); 
            const [translation, setTranslation] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isAudioLoading, setIsAudioLoading] = useState(false);
            const [error, setError] = useState(null);
            
            // API KEY INTEGRADA DE GOOGLE GEMINI
            const API_KEY = "AQ.Ab8RN6JikQTHMa7I9sMXHUj-C_DbEAZQFaiCZtseucow8VWNgQ";

            // PARAMETRIZACIÓN PREMIUM
            const [isPremiumUnlocked, setIsPremiumUnlocked] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);

            const SECRET_MASTER_PIN = "MILTON2026";
            
            // CONFIGURACIÓN DE TU CONTACTO DE WHATSAPP (Reemplaza por tu número real si lo deseas)
            const WHATSAPP_NUMBER = "50588888888"; 
            const WHATSAPP_LINK = `https://wa.me/${WHATSAPP_NUMBER}?text=Hola%20Milton,%20quiero%20comprar%20el%20PIN%20Premium%20para%20el%20Traductor%20Nica`;

            // Referencia HTML5 Audio para reproducción nativa en móvil
            const audioRef = useRef(null);

            // Carga de estado Premium desde la memoria persistente del navegador
            useEffect(() => {
                const savedPin = localStorage.getItem('nica_translator_premium_pin');
                if (savedPin === SECRET_MASTER_PIN) {
                    setIsPremiumUnlocked(true);
                }
            }, []);

            // Desbloqueo de módulos Premium
            const handleUnlockPremium = () => {
                if (pinInput.trim() === SECRET_MASTER_PIN) {
                    localStorage.setItem('nica_translator_premium_pin', SECRET_MASTER_PIN);
                    setIsPremiumUnlocked(true);
                    setPinError(false);
                } else {
                    setPinError(true);
                }
            };

            // Volver a bloquear (Cierre de sesión)
            const handleLockPremium = () => {
                localStorage.removeItem('nica_translator_premium_pin');
                setIsPremiumUnlocked(false);
                setPinInput('');
                setTranslation(null);
            };

            // Diccionario de contingencia local rápida
            const localDictionary = {
                "chele": "Persona de tez clara o rubia.",
                "tuani": "Algo excelente, genial, bonito o de buena calidad.",
                "deacachimba": "Espectacular, sumamente bueno o excelente.",
                "palmado": "Sin dinero, quebrado financieramente.",
                "ideay": "Expresión de sorpresa, reclamo o saludo ('¿Qué pasó?').",
                "arrecho": "Enojado, furioso o con mal carácter.",
                "batuquear": "Mover fuertemente un líquido o agitar cosas.",
                "chigüín": "Niño pequeño, muchacho.",
                "chunche": "Cosa, objeto cuyo nombre no se recuerda.",
                "pofi": "Amigo íntimo, compañero de confianza.",
                "maje": "Persona, amigo (o tonto, según el contexto de uso)."
            };

            // Comprobación de permisos de canal
            const isModeLocked = (mode) => {
                const premiumModes = ['usSlangToSpanish', 'englishToUsSlang'];
                return premiumModes.includes(mode) && !isPremiumUnlocked;
            };

            // Generador de cabeceras WAV para decodificación PCM de 16-bits a 24kHz
            const pcmToWav = (pcmData, sampleRate = 24000) => {
                const buffer = new ArrayBuffer(44 + pcmData.length);
                const view = new DataView(buffer);

                // "RIFF"
                view.setUint32(0, 0x52494646, false);
                // Tamaño total del archivo final
                view.setUint32(4, 36 + pcmData.length, true);
                // "WAVE"
                view.setUint32(8, 0x57415645, false);

                // "fmt " chunk
                view.setUint32(12, 0x666d7420, false);
                view.setUint32(16, 16, true); // Tamaño chunk fmt (16 bytes para PCM lineal)
                view.setUint16(20, 1, true); // Formato (1 = PCM)
                view.setUint16(22, 1, true); // Canales (1 = Mono)
                view.setUint32(24, sampleRate, true); // Frecuencia de muestreo (24000Hz)
                view.setUint32(28, sampleRate * 2, true); // Frecuencia * Bloques (24000 * 2)
                view.setUint16(32, 2, true); // Alineación (Canales * Bytes por muestra = 1 * 2)
                view.setUint16(34, 16, true); // Bits por muestra (16 bits)

                // "data" chunk
                view.setUint32(36, 0x64617461, false);
                view.setUint32(40, pcmData.length, true);

                // Inyección de los datos binarios PCM
                for (let i = 0; i < pcmData.length; i++) {
                    view.setUint8(44 + i, pcmData[i]);
                }

                return new Blob([buffer], { type: 'audio/wav' });
            };

            // Procesamiento y síntesis de voz (Text-to-Speech) Premium de Google
            const playTranslationAudio = async (textToSpeak) => {
                if (!isPremiumUnlocked) return;
                setIsAudioLoading(true);
                setError(null);

                const voiceInstruction = translationMode === 'usSlangToSpanish' 
                    ? `Say this American slang phrase naturally with native pronunciation: "${textToSpeak}"`
                    : `Say this American phrase clearly: "${textToSpeak}"`;

                const payload = {
                    contents: [{ parts: [{ text: voiceInstruction }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: {
                                    voiceName: "Zephyr" // Registro de voz para pronunciación clara
                                }
                            }
                        }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                // Algoritmo de reintentos robustos con exponencial backoff (hasta 5 iteraciones)
                let attempt = 0;
                const maxAttempts = 5;
                let success = false;
                let audioBase64 = null;

                while (attempt < maxAttempts && !success) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            const result = await response.json();
                            audioBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                            if (audioBase64) {
                                success = true;
                            } else {
                                throw new Error("Datos de audio corruptos o vacíos.");
                            }
                        } else {
                            throw new Error("Respuesta errónea de la API.");
                        }
                    } catch (e) {
                        attempt++;
                        if (attempt >= maxAttempts) {
                            setError("Error al sintetizar voz por IA. Inténtalo de nuevo más tarde.");
                            setIsAudioLoading(false);
                            return;
                        }
                        // Espera exponencial: 1s, 2s, 4s, 8s, 16s
                        await new Promise(res => setTimeout(res, Math.pow(2, attempt) * 500));
                    }
                }

                try {
                    // Procesar binarios Base64 a datos PCM nativos
                    const binaryString = window.atob(audioBase64);
                    const len = binaryString.length;
                    const bytes = new Uint8Array(len);
                    for (let i = 0; i < len; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }

                    // Conversión binaria de PCM a WAV reproducible
                    const wavBlob = pcmToWav(bytes, 24000);
                    const audioUrl = URL.createObjectURL(wavBlob);

                    if (audioRef.current) {
                        audioRef.current.src = audioUrl;
                        audioRef.current.play();
                    }
                } catch (e) {
                    setError("Error del reproductor de sonido al procesar el archivo final.");
                } finally {
                    setIsAudioLoading(false);
                }
            };

            // Función principal de traducción inteligente (Procesamiento de Lenguaje Natural)
            const translateText = async () => {
                if (isModeLocked(translationMode)) {
                    setError('Este módulo requiere una clave Premium activa.');
                    return;
                }

                if (!inputText.trim()) {
                    setError('Escribe una palabra o frase para comenzar.');
                    setTranslation(null);
                    return;
                }

                setIsLoading(true);
                setError(null);
                setTranslation(null);

                let prompt = '';
                if (translationMode === 'nicaToStandard') {
                    prompt = `Traduce el siguiente texto en Español Nicaragüense a un español estándar neutro. Identifica y explica detalladamente cada término nicaragüense. Texto Original: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'standardToNica') {
                    prompt = `Traduce el siguiente texto en español estándar a un Español Nicaragüense coloquial y natural de forma auténtica. Texto Original: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'nicaToEnglish') {
                    prompt = `Translate the following Nicaraguan Spanish text into natural English. Identify and explain terms in English. Original Text: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'usSlangToSpanish') {
                    prompt = `Traduce el siguiente texto en inglés de EE.UU. (slang/idioms) a su equivalente más natural en español coloquial o nica. Texto Original: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                } else if (translationMode === 'englishToUsSlang') {
                    prompt = `Transform the following standard English text into informal American English with heavy US slang. Original Text: "${inputText}" Devuelve estricto JSON: {"translatedText": "...", "terms": [{"term": "...", "explanation": "..."}]}`;
                }

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                "translatedText": { "type": "STRING" },
                                "terms": {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: {
                                            term: { type: "STRING" },
                                            explanation: { type: "STRING" }
                                        },
                                        required: ["term", "explanation"]
                                    }
                                }
                            },
                            required: ["translatedText", "terms"]
                        }
                    }
                };

                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`El motor de traducción no pudo procesar la solicitud en este momento.`);
                    const result = await response.json();
                    if (result.candidates && result.candidates[0]?.content?.parts[0]?.text) {
                        const cleanedText = result.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                        setTranslation(JSON.parse(cleanedText));
                    } else {
                        setError('No se pudo decodificar el resultado del traductor.');
                    }
                } catch (err) {
                    setError(err.message || 'Error de conexión a internet.');
                } finally {
                    setIsLoading(false);
                }
            };

            const getPlaceholder = () => {
                if (isModeLocked(translationMode)) return "🔒 Desbloquea el Módulo Americano Premium para usar esta función...";
                if (translationMode === 'standardToNica') return 'Escribe algo formal (ej. "Hola amigo, no tengo dinero")...';
                if (translationMode === 'usSlangToSpanish') return 'Escribe jerga de EE.UU. (ej. "I\'m totally broke")...';
                if (translationMode === 'nicaToEnglish') return 'Escribe en nica para pasarlo a inglés (ej. "Ese maje es bien tuani")...';
                return 'Escribe en Español Nicaragüense (ej. "Ideay chele, ando palmado")...';
            };

            return (
                <div className="bg-slate-900/90 border border-slate-800 p-5 md:p-8 rounded-2xl shadow-2xl w-full text-white backdrop-blur-md transition-all duration-300 relative">
                    
                    {/* Elemento de audio oculto */}
                    <audio ref={audioRef} className="hidden" />

                    {/* Encabezado Principal */}
                    <div className="flex justify-between items-start mb-6">
                        <div className="text-left">
                            <h1 className="text-2xl sm:text-4xl font-extrabold tracking-tight leading-tight">
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Traductor Nica</span>{" "}
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-amber-400">Milton v2.7</span>
